# 브랜드 프로필 — 운영자 다계정 운영용 (2026-06-12 운영자 확정: 프로필 설정파일 방식)
# 프로필별로 표지 상단 표제·세로 표제 박스/낙관 글자·맺음 서명이 바뀐다.
# 새 계정은 아래 형식으로 한 블록만 추가하면 됨. CLI --brand <키> / 웹폼 선택.
#
#   <프로필키>:
#     seal: 낙관·표지 세로 박스 글자(2~4자 권장)
#     cover_title: 표지 상단 붓글씨 표제
#     closing_sign: 맺음 서명(colophon 끝 줄, 비우면 생략)

default:
  seal: 사주명리
  cover_title: 종합 사주 풀이
  closing_sign: 사주명리 드림

# 예시 프로필(운영자 계정명으로 교체·추가)
seodam:
  seal: 서담선생
  cover_title: 서담선생 종합 사주 풀이
  closing_sign: 서담선생 드림
