<?xml version="1.0" encoding="UTF-8"?>
<!-- 한지(韓紙) 텍스처 — 절차 생성(시드 고정 = 결정론, 라이선스 리스크 0).
     A4 비율 1240x1754(150dpi). 저주파 얼룩 + 고주파 섬유 2겹 + 가장자리 비네트. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
  <defs>
    <!-- 저주파: 종이의 큰 얼룩(물결) -->
    <filter id="blot" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.009" numOctaves="3" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.90  0 0 0 0 0.86  0 0 0 0 0.74  0 0 0 0.85 0.30"/>
    </filter>
    <!-- 고주파: 한지 섬유결 -->
    <filter id="fiber" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.22 0.05" numOctaves="2" seed="13" result="f"/>
      <feColorMatrix in="f" type="matrix"
        values="0 0 0 0 0.78  0 0 0 0 0.72  0 0 0 0 0.58  0 0 0 0.50 0.10"/>
    </filter>
    <!-- 미세 점박이(닥섬유 티) -->
    <filter id="speck" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="1" seed="29" result="s"/>
      <feColorMatrix in="s" type="matrix"
        values="0 0 0 0 0.70  0 0 0 0 0.63  0 0 0 0 0.47  0 0 0 0.8 -0.55"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="48%" r="75%">
      <stop offset="0%" stop-color="#f6f0e0" stop-opacity="0"/>
      <stop offset="78%" stop-color="#efe6cf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e6dabd" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="#f6f0e0"/>
  <rect width="100%" height="100%" filter="url(#blot)"/>
  <rect width="100%" height="100%" filter="url(#fiber)"/>
  <rect width="100%" height="100%" filter="url(#speck)"/>
  <rect width="100%" height="100%" fill="url(#vig)"/>
</svg>
